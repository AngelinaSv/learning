<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Storage</title>
  <style>
    * { box-sizing: border-box; font-family: sans-serif; }
    body { max-width: 900px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
    h1, h2, h3 { color: #333; }
    .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    input { display: block; margin: 10px 0; padding: 10px; width: 100%; max-width: 300px; border: 1px solid #ddd; }
    button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; }
    .btn-primary { background: #2196f3; color: white; }
    .btn-success { background: #4caf50; color: white; }
    .btn-danger { background: #f44336; color: white; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #333; color: white; }
    .message { padding: 12px; margin: 10px 0; border-radius: 4px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .hidden { display: none; }
    .header { display: flex; justify-content: space-between; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>File Storage</h1>
    <span id="userInfo" class="hidden">
      <span id="currentEmail"></span>
      <button onclick="logout()">Logout</button>
    </span>
  </div>

  <div id="authSection" class="card">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button class="btn-primary" onclick="doLogin()">Login</button>
    <button class="btn-success" onclick="showRegister()">Register</button>
    <div id="authMessage" class="message"></div>
  </div>

  <div id="registerSection" class="card hidden">
    <h2>Register</h2>
    <input type="text" id="firstName" placeholder="First Name" />
    <input type="text" id="lastName" placeholder="Last Name" />
    <input type="email" id="regEmail" placeholder="Email" />
    <input type="password" id="regPassword" placeholder="Password" />
    <button class="btn-success" onclick="doRegister()">Register</button>
    <button onclick="showLogin()">Back</button>
    <div id="regMessage" class="message"></div>
  </div>

  <div id="mainSection" class="hidden">
    <div class="card">
      <h3>Upload</h3>
      <input type="file" id="fileInput" />
      <button class="btn-primary" onclick="doUpload()">Upload</button>
      <div id="uploadMessage" class="message"></div>
    </div>
    <div class="card">
      <h3>Files</h3>
      <div id="filesMessage" class="message"></div>
      <div id="filesContainer"></div>
    </div>
    <div class="card">
      <h3>Profile</h3>
      <input type="text" id="updateFirstName" placeholder="First Name" />
      <input type="text" id="updateLastName" placeholder="Last Name" />
      <button class="btn-primary" onclick="doUpdateProfile()">Update</button>
      <div id="profileMessage" class="message"></div>
    </div>
    <div class="card">
      <button class="btn-danger" onclick="doDeleteAccount()">Delete Account</button>
      <div id="deleteMessage" class="message"></div>
    </div>
  </div>

  <script>
    var accessToken = localStorage.getItem('accessToken');
    var currentUser = null;

    function get(id) { return document.getElementById(id); }
    function show(id) { id.classList.remove('hidden'); }
    function hide(id) { id.classList.add('hidden'); }

    function msg(id, text, type) {
      var el = get(id);
      el.className = 'message ' + (type || 'error');
      el.textContent = text;
      if (type === 'success') setTimeout(function(){ el.textContent = ''; }, 3000);
    }

    function formatBytes(bytes) {
      if (!bytes) return '0 B';
      var k = 1024, sizes = ['B', 'KB', 'MB', 'GB'];
      var i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function getHeaders() {
      var h = { 'Authorization': 'Bearer ' + accessToken };
      if (currentUser && currentUser.roles) {
        h['X-User-Roles'] = currentUser.roles.map(function(r){ return r.name || r; }).join(',');
      }
      return h;
    }

    function showLogin() {
      hide(get('registerSection'));
      show(get('authSection'));
    }

    function showRegister() {
      hide(get('authSection'));
      show(get('registerSection'));
    }

    function doRegister() {
      var firstName = get('firstName').value;
      var lastName = get('lastName').value;
      var email = get('regEmail').value;
      var password = get('regPassword').value;

      if (!firstName || !lastName || !email || !password) {
        msg('regMessage', 'Fill all fields');
        return;
      }

      fetch('/auth/sign-up', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ firstName: firstName, lastName: lastName, email: email, password: password })
      })
      .then(function(res){ return res.json(); })
      .then(function(data) {
        if (!data.accessToken) throw new Error(data.message || 'Error');
        msg('regMessage', 'Registered! Now login.', 'success');
        showLogin();
        get('email').value = email;
      })
      .catch(function(e){ msg('regMessage', e.message); });
    }

    function doLogin() {
      var email = get('email').value;
      var password = get('password').value;

      if (!email || !password) {
        msg('authMessage', 'Enter email and password');
        return;
      }

      fetch('/auth/sign-in', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password })
      })
      .then(function(res){ return res.json(); })
      .then(function(data) {
        if (!data.accessToken) throw new Error(data.message || 'Error');
        accessToken = data.accessToken;
        localStorage.setItem('accessToken', accessToken);
        currentUser = data.user || data;
        showMain();
      })
      .catch(function(e){ msg('authMessage', e.message); });
    }

    function logout() {
      accessToken = null;
      currentUser = null;
      localStorage.removeItem('accessToken');
      hide(get('mainSection'));
      hide(get('userInfo'));
      show(get('authSection'));
    }

    function showMain() {
      hide(get('authSection'));
      hide(get('registerSection'));
      show(get('mainSection'));
      show(get('userInfo'));
      get('currentEmail').textContent = currentUser.email;
      get('updateFirstName').value = currentUser.firstName || '';
      get('updateLastName').value = currentUser.lastName || '';
      loadFiles();
    }

    function loadFiles() {
      fetch('/file', { headers: getHeaders() })
      .then(function(res){ return res.json(); })
      .then(function(files) { renderFiles(files); })
      .catch(function(e){ msg('filesMessage', e.message); });
    }

    function renderFiles(files) {
      var c = get('filesContainer');
      if (!files.length) { c.innerHTML = '<p>No files</p>'; return; }
      var html = '<table><thead><tr><th>Filename</th><th>Size</th><th>Actions</th></tr></thead><tbody>';
      files.forEach(function(f) {
        html += '<tr><td>' + f.filename + '</td><td>' + formatBytes(f.size) + '</td><td>' +
          '<button onclick="viewFile(\'' + f.filename + '\')">View</button> ' +
          '<button onclick="deleteFile(\'' + f.filename + '\')">Delete</button></td></tr>';
      });
      c.innerHTML = html + '</tbody></table>';
    }

    function doUpload() {
      var fi = get('fileInput');
      if (!fi.files.length) return;

      var fd = new FormData();
      fd.append('file', fi.files[0]);
      msg('uploadMessage', 'Uploading...');

      fetch('/file/upload', {
        method: 'POST',
        headers: getHeaders(),
        body: fd
      })
      .then(function(res){ return res.json(); })
      .then(function(data) {
        msg('uploadMessage', 'Uploaded!', 'success');
        fi.value = '';
        loadFiles();
      })
      .catch(function(e){ msg('uploadMessage', e.message); });
    }

    function viewFile(filename) {
      window.open('/file/' + encodeURIComponent(filename), '_blank');
    }

    function deleteFile(filename) {
      if (!confirm('Delete ' + filename + '?')) return;
      fetch('/file/' + encodeURIComponent(filename), {
        method: 'DELETE',
        headers: getHeaders()
      })
      .then(function(){ msg('filesMessage', 'Deleted', 'success'); loadFiles(); })
      .catch(function(e){ msg('filesMessage', e.message); });
    }

    function doUpdateProfile() {
      var firstName = get('updateFirstName').value;
      var lastName = get('updateLastName').value;
      var h = getHeaders();
      h['Content-Type'] = 'application/json';

      fetch('/user/' + currentUser.id, {
        method: 'PATCH',
        headers: h,
        body: JSON.stringify({ firstName: firstName, lastName: lastName })
      })
      .then(function(res){ return res.json(); })
      .then(function() {
        currentUser.firstName = firstName;
        currentUser.lastName = lastName;
        msg('profileMessage', 'Updated!', 'success');
      })
      .catch(function(e){ msg('profileMessage', e.message); });
    }

    function doDeleteAccount() {
      if (!confirm('Delete account?')) return;
      fetch('/user/' + currentUser.id, {
        method: 'DELETE',
        headers: getHeaders()
      })
      .then(function(){ alert('Deleted'); logout(); })
      .catch(function(e){ msg('deleteMessage', e.message); });
    }

    // Init
    if (accessToken) {
      fetch('/auth/profile', { headers: { 'Authorization': 'Bearer ' + accessToken } })
      .then(function(res){ if (res.ok) return res.json(); throw new Error(); })
      .then(function(u){ currentUser = u; showMain(); })
      .catch(function(){ logout(); });
    }
  </script>
</body>
</html>

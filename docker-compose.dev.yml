services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ./app/.env.development
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ./app
      target: development
    command: sh -c "npx prisma generate && npm run start:dev"
    restart: unless-stopped
    ports:
      - "3009:3009"
    env_file:
      - ./app/.env.development
    volumes:
      - ./app:/app
      # Preserve container-installed dependencies when source is bind mounted.
      - app_dev_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  postgres_dev_data:
  redis_dev_data:
  app_dev_node_modules:

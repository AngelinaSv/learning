services:
  postgres:
    image: postgres:16
    restart: always
    ports:
      - "5433:5432"
    env_file:
      - ./app/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: ./app
    restart: always
    ports:
      - "3009:3009"
    depends_on:
      - postgres
    env_file:
      - ./app/.env

volumes:
  postgres_data:

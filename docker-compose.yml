services:
  postgres:
    image: postgres:16
    restart: always
    ports:
      - "5433:5432"
    env_file:
      - ./app/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: ./app
    restart: always
    ports:
      - "3009:3009"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - ./app/.env

volumes:
  postgres_data:
  redis_data:

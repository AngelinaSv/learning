services:
  app:
    container_name: internship_app
    build:
      context: ./app
      dockerfile: Dockerfile
      target: development
    image: internship_app_image
    restart: unless-stopped
    env_file:
      - ./app/.env
    ports:
      - "3009:3009"
    volumes:
      - ./app:/app
      - internship_node_modules:/app/node_modules
    depends_on:
      - postgres
    environment:
      CHOKIDAR_USEPOLLING: true
    command: npm run start:dev

  postgres:
    container_name: internship_postgres
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  internship_node_modules:
  postgres_data:

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: study_node_app
    volumes:
      - ./app:/usr/src/app  # Синхронізація вашого коду з контейнером
    ports:
      - "3000:3000"         # Порт для API
      - "3001:3001"         # Порт для WebSockets
